# ============================================================================
# Per-device stub for the OpenAI Realtime Voice PE firmware -- DEV CHANNEL.
# Tracks the repo's `dev` branch (WIP) + the dev add-on on port 8081. For the
# stable channel, use the @main stubs on the `main` branch instead.
#
# Copy THIS into your ESPHome dashboard ONCE (add/adopt the device, then edit its
# YAML). It pulls the full firmware from this repo as a remote `packages:` include,
# so future updates are one click ("Update available") in the dashboard -- no more
# copy-pasting the whole config.
#
#   1. Set `name` / `friendly_name` for your device.
#   2. Put the keys below in your ESPHome secrets.yaml (Builder -> Secrets):
#        wifi_ssid, wifi_password, ota_password, api_key
#   3. Install once. After that, click Update whenever a new version ships.
# ============================================================================
substitutions:
  name: my-voice-pe                  # your device's name -- keep it stable!
  friendly_name: Home Assistant Voice
  # Secrets -> substitutions (a remote package can't use !secret directly):
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  ota_password: !secret ota_password
  api_key: !secret api_key
  # DEV channel: talk to the dev add-on (port 8081), not stable (8080).
  va_url: "ws://homeassistant.local:8081/"

packages:
  realtime: github://xandervanerven/home-assistant-voice-pe/home-assistant-voice.realtime.yaml@dev

dashboard_import:
  package_import_url: github://xandervanerven/home-assistant-voice-pe/home-assistant-voice.realtime.yaml@dev
  import_full_config: false

# --- Fixed (static) IP? -----------------------------------------------------
# This file uses DHCP. For a fixed IP, use esphome-builder.static-ip.yaml instead
# -- a ready-to-paste version with the manual_ip block already wired up.
# ============================================================================
