# ============================================================================
# Per-device stub for the OpenAI Realtime Voice PE firmware -- FIXED IP variant.
#
# Same as esphome-builder.dhcp.yaml, but pinned to a static IP. Copy THIS into your
# ESPHome dashboard ONCE (adopt the device, then edit its YAML). It pulls the
# full firmware from this repo as a remote package, so updates are one click
# ("Update available") in the dashboard -- no more copy-pasting the whole config.
#
#   1. Set `name` / `friendly_name` for your device.
#   2. Put these keys in your ESPHome secrets.yaml (Builder -> Secrets):
#        wifi_ssid, wifi_password, ota_password, api_key,
#        static_ip, gateway, subnet, dns1, dns2
#   3. Install once. After that, click Update whenever a new version ships.
#
# (For DHCP instead of a fixed IP, use esphome-builder.dhcp.yaml.)
# ============================================================================
substitutions:
  name: my-voice-pe                  # your device's name -- keep it stable!
  friendly_name: Home Assistant Voice
  # Secrets -> substitutions (a remote package can't use !secret directly):
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  ota_password: !secret ota_password
  api_key: !secret api_key
  static_ip: !secret static_ip
  gateway: !secret gateway
  subnet: !secret subnet
  dns1: !secret dns1
  dns2: !secret dns2

# Long form ON PURPOSE: the github:// shorthand has no refresh option, and
# ESPHome then caches the downloaded yaml for a DAY -- clicking Update right
# after a release could silently rebuild yesterday's code. refresh: 0s makes
# every compile fetch the latest release.
packages:
  realtime:
    url: https://github.com/TristanBrotherton/home-assistant-voice-pe
    ref: main
    files: [home-assistant-voice.realtime.yaml]
    refresh: 0s
  # Merge a manual_ip block into the firmware's wifi: config for a fixed IP:
  static_ip:
    wifi:
      manual_ip:
        static_ip: ${static_ip}
        gateway: ${gateway}
        subnet: ${subnet}
        dns1: ${dns1}
        dns2: ${dns2}

dashboard_import:
  package_import_url: github://TristanBrotherton/home-assistant-voice-pe/home-assistant-voice.realtime.yaml@main
  import_full_config: false
